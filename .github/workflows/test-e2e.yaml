name: E2E Test

on:
  pull_request

jobs:
  e2e-test:
    name: E2E Test
    runs-on:
      labels: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        kubernetes-version: ["1.29.14", "1.30.0", "1.31.0", "1.32.3"]

    steps:
      # Step 1: Checkout the Kubeflow SDK repository (your primary working repository)
      # This will be cloned to the root of the runner's workspace (e.g., /home/runner/work/sdk/sdk/)
      # This is where your Makefile and the 'python' directory for SDK installation reside.
      - name: Checkout Kubeflow SDK repository
        uses: actions/checkout@v4
        with:
          repository: kubeflow/sdk # Explicitly specify the SDK repo
          ref: main # Or the branch you want to use for the SDK (e.g., specific branch name, or ${{ github.ref_name }} if it's based on the PR's branch)
          path: . # Clones to the root of the workspace

      # Step 2: Checkout the Kubeflow Trainer repository
      # This is needed to get the go.mod file for Go tool versions (Kind, etc.)
      # It's cloned into a *separate* subdirectory named 'trainer-repo' to avoid conflicts.
      - name: Checkout Kubeflow Trainer repo for Go version
        uses: actions/checkout@v4
        with:
          repository: kubeflow/trainer
          ref: master # Or 'main', depending on the default branch name of the trainer repo
          path: trainer-repo

      # Step 3: Get Go and KIND versions from the trainer repo's go.mod
      # These versions will be set as environment variables for subsequent steps.
      - name: Get Go and KIND versions from trainer repo
        run: |
          echo "Extracting Go version from trainer-repo/go.mod..."
          GO_VERSION=$(grep '^go ' ./trainer-repo/go.mod | awk '{print $2}' | tr -d '\n')
          echo "Detected Go version from trainer/go.mod: $GO_VERSION"
          echo "GO_VERSION=$GO_VERSION" >> "$GITHUB_ENV"

          echo "Extracting KIND version from trainer-repo/go.mod..."
          # This specifically looks for 'sigs.k8s.io/kind' and extracts its version
          KIND_VERSION=$(grep 'sigs.k8s.io/kind' ./trainer-repo/go.mod | awk '{print $2}' | tr -d '\n')
          echo "Detected KIND version from trainer/go.mod: $KIND_VERSION"
          echo "KIND_VERSION=$KIND_VERSION" >> "$GITHUB_ENV"
        # This step implicitly runs from the root of the workspace (./) where 'trainer-repo' exists.

      # Step 4: Setup Go environment using the dynamically detected version
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }} # Use the GO_VERSION environment variable

      # Step 5: Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      # Step 6: Install Python dependencies
      - name: Install dependencies
        run: |
          echo "Installing Papermill and Jupyter"
          pip install papermill==2.6.0 jupyter==1.1.1 ipykernel==6.29.5

          echo "Installing Kubeflow SDK locally from ./python"
          # This path (./python) is relative to the *main* repository checkout (kubeflow/sdk)
          pip install ./python
        working-directory: . # Ensure pip runs from the SDK repo root

      # Step 7: Setup the Kind cluster for e2e tests
      - name: Setup cluster
        run: |
          # Pass the dynamically obtained KIND_VERSION to override the Makefile's default.
          # The Makefile assumes kind is installed to LOCALBIN, which is derived from PROJECT_DIR.
          # PROJECT_DIR is relative to the Makefile, which is at the root of the SDK repo.
          make test-e2e-setup-cluster \
            K8S_VERSION=${{ matrix.kubernetes-version }} \
            KIND_VERSION=${{ env.KIND_VERSION }}
        working-directory: . # Execute make from the root of the SDK repo

      # Step 8: Run e2e tests using example Notebooks
      - name: Run e2e test for example Notebooks
        run: |
          mkdir -p artifacts/notebooks # Create the output directory
          # Execute make commands, passing notebook paths and output locations
          make test-e2e-notebook \
            NOTEBOOK_INPUT=./examples/training/pytorch/image-classification/mnist.ipynb \
            NOTEBOOK_OUTPUT=./artifacts/notebooks/${{ matrix.kubernetes-version }}_mnist.ipynb \
            PAPERMILL_TIMEOUT=900
          make test-e2e-notebook \
            NOTEBOOK_INPUT=./examples/training/pytorch/question-answering/fine-tune-distilbert.ipynb \
            NOTEBOOK_OUTPUT=./artifacts/notebooks/${{ matrix.kubernetes-version }}_fine-tune-distilbert.ipynb \
            PAPERMILL_TIMEOUT=900
        working-directory: . # Execute make from the root of the SDK repo

      # Step 9: Upload generated artifacts (notebook outputs) to GitHub
      - name: Upload Artifacts to GitHub
        uses: actions/upload-artifact@v4
        if: always() # Ensure artifacts are uploaded even if previous steps fail
        with:
          name: ${{ matrix.kubernetes-version }}
          path: ./artifacts/notebooks/* # Path relative to the workspace root
          retention-days: 1 # How long to keep the artifacts
